<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AREA — Dual-Axis Crash</title>
<style>
  :root{
    --bg:#0a0a12;
    --panel:#12121f;
    --grid:#1e1e30;
    --ink:#e8e8f0;
    --muted:#7a7a92;
    --red:#ff3b5c;
    --red-dim:#7a1c2c;
    --green:#4dd62e;
    --green-soft:#9bef84;
    --blue:#2e9bff;
    --blue-dim:#143d63;
    --gold:#ffd34d;
    --win:#3ddc84;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:"DM Mono",ui-monospace,"SF Mono",Menlo,monospace;
    display:flex;align-items:center;justify-content:center;
    min-height:100vh;padding:16px;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{width:100%;max-width:620px}
  header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:14px}
  h1{font-size:13px;letter-spacing:0.5em;font-weight:700;text-transform:uppercase}
  h1 .a{color:var(--green)}h1 .b{color:var(--blue)}
  .balance{font-size:12px;color:var(--muted)}
  .balance b{color:var(--gold);font-size:15px}

  .stage{
    position:relative;background:var(--panel);
    border:1px solid var(--grid);border-radius:10px;
    overflow:hidden;
  }
  .canvas-box{position:relative;width:100%;aspect-ratio:1/1}
  canvas{display:block;width:100%;height:100%}

  /* multiplier readouts */
  .reads{position:absolute;top:12px;left:12px;right:12px;display:flex;justify-content:space-between;pointer-events:none}
  .read{font-variant-numeric:tabular-nums}
  .read .lbl{font-size:9px;letter-spacing:0.25em;text-transform:uppercase;color:var(--muted)}
  .read .val{font-size:26px;font-weight:700;line-height:1}
  .read.r .val{color:var(--green)}
  .read.b{text-align:right}
  .read.b .val{color:var(--blue)}
  .read.locked .val{opacity:.55}
  .read.crashed .val{color:#555;text-decoration:line-through}

  /* center status */
  .status{
    position:absolute;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;pointer-events:none;
    text-align:center;
  }
  .status .big{font-size:30px;font-weight:700;letter-spacing:0.02em;padding:0 12px;text-align:center}
  .status .sub{font-size:11px;color:var(--muted);letter-spacing:0.2em;text-transform:uppercase;margin-top:6px}
  .status .area-now{font-size:30px;font-weight:700;color:var(--gold);margin-top:10px;font-variant-numeric:tabular-nums;letter-spacing:0.02em}

  /* controls */
  .controls{padding:14px;display:flex;flex-direction:column;gap:10px}
  .bet-row{display:flex;gap:10px;align-items:stretch}
  .bet-input{
    flex:1;display:flex;align-items:center;gap:8px;
    background:var(--bg);border:1px solid var(--grid);border-radius:8px;padding:0 12px;
  }
  .bet-input span{font-size:11px;color:var(--muted)}
  .bet-input input{
    background:none;border:none;color:var(--ink);font-family:inherit;
    font-size:16px;width:100%;outline:none;font-variant-numeric:tabular-nums;
  }
  .chips{display:flex;gap:6px}
  .chip{background:var(--bg);border:1px solid var(--grid);color:var(--muted);
    border-radius:6px;padding:0 10px;font-size:11px;font-family:inherit;cursor:pointer}
  .chip:hover{border-color:var(--muted);color:var(--ink)}

  button{font-family:inherit;cursor:pointer;border:none;border-radius:8px;
    font-weight:700;letter-spacing:0.1em;text-transform:uppercase;transition:.12s}
  button:disabled{cursor:not-allowed;opacity:.35}

  .place{width:100%;padding:16px;font-size:14px;background:var(--gold);color:#1a1400}
  .place:not(:disabled):hover{filter:brightness(1.1)}

  .lock-row{display:flex;gap:10px}
  .lock{flex:1;padding:18px 10px;font-size:13px;color:#fff;display:flex;flex-direction:column;gap:3px;align-items:center}
  .lock .v{font-size:18px;font-variant-numeric:tabular-nums}
  .lock.red{background:var(--green)}
  .lock.red:not(:disabled):hover{background:#61e644}
  .lock.blue{background:var(--blue)}
  .lock.blue:not(:disabled):hover{background:#4facff}
  .lock.done{background:var(--grid);color:var(--muted)}

  .lock-both{
    width:100%;margin-top:10px;padding:14px;font-size:13px;color:#fff;
    background:linear-gradient(90deg,var(--green),var(--blue));
  }
  .lock-both:not(:disabled):hover{filter:brightness(1.12)}
  .lock-both:disabled{background:var(--grid);color:var(--muted)}

  .hint{font-size:10.5px;color:var(--muted);text-align:center;line-height:1.5;letter-spacing:0.03em}
  .hidden{display:none!important}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1><span class="a">A</span>R<span class="b">E</span>A</h1>
    <div class="balance">BAL <b id="bal">$1,000.00</b></div>
  </header>

  <div class="stage">
    <div class="canvas-box">
      <canvas id="cv" width="1000" height="1000"></canvas>
      <div class="reads">
        <div class="read r" id="readR">
          <div class="lbl">Green ×</div>
          <div class="val" id="valR">1.00</div>
        </div>
        <div class="read b" id="readB">
          <div class="lbl">Blue ×</div>
          <div class="val" id="valB">1.00</div>
        </div>
      </div>
      <div class="status" id="status">
        <div class="big" id="statusBig">PLACE BET</div>
        <div class="sub" id="statusSub">lock both axes before either crashes</div>
        <div class="area-now hidden" id="areaNow"></div>
      </div>
    </div>
  </div>

  <div class="controls">
    <!-- BETTING STATE -->
    <div id="betPanel">
      <div class="bet-row" style="margin-bottom:10px">
        <div class="bet-input">
          <span>BET&nbsp;$</span>
          <input id="betAmt" type="number" value="10" min="1" step="1">
        </div>
        <div class="chips">
          <button class="chip" data-c="5">+5</button>
          <button class="chip" data-c="25">+25</button>
          <button class="chip" data-c="100">+100</button>
          <button class="chip" data-c="x2">×2</button>
        </div>
      </div>
      <button class="place" id="placeBtn">Place Bet</button>
    </div>

    <!-- PLAYING STATE -->
    <div id="playPanel" class="hidden">
      <div class="lock-row">
        <button class="lock red" id="lockR">
          <span>Lock Green</span>
          <span class="v" id="lockRv">1.00×</span>
        </button>
        <button class="lock blue" id="lockB">
          <span>Lock Blue</span>
          <span class="v" id="lockBv">1.00×</span>
        </button>
      </div>
      <button class="lock-both" id="lockBoth">Lock Both</button>
    </div>

    <div class="hint" id="hint">
      Payout = bet × (Green locked × Blue locked). Lock each axis independently —
      but if an unlocked axis crashes, the whole bet is lost.
    </div>
  </div>
</div>

    const r = Math.random();
    // crash multiplier, sampled directly in multiplier-space (independent of growth rate).
    // heavier tail so big areas are possible but rare; floor keeps early rounds playable.
    const m = 1 + (-Math.log(1 - r*0.97)) * 1.4;
    return Math.max(1.3, m);
  }

  // format a number as USD, e.g. 24.5 -> "$24.50", 1000 -> "$1,000.00"
  function usd(v){
    return '$'+Number(v).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  }

  function setBalance(v){ balance=v; elBal.textContent=usd(balance); }

  // Open a fresh betting window. Crash points are sampled NOW (round is predetermined),
  // so when this is server-driven every synced client gets the same round.
  function openBettingWindow(){
    phase='bet';
    betPlaced=false;
    red  = {mult:1, ghost:1, locked:false, crashed:false, settled:false, crashAt:sampleCrash(RED_RATE)};
    blue = {mult:1, ghost:1, locked:false, crashed:false, settled:false, crashAt:sampleCrash(BLUE_RATE)};

    playPanel.classList.add('hidden');
    betPanel.classList.remove('hidden');
    elAreaNow.classList.add('hidden');
    elBig.style.color='';
    elReadR.className='read r'; elReadB.className='read b';
    elValR.textContent='1.00'; elValB.textContent='1.00';
    lockRv.textContent='1.00×'; lockBv.textContent='1.00×';
    placeBtn.disabled=false;
    betAmt.disabled=false;
    clearCanvas();

    betEndsAt = Date.now() + BET_WINDOW;
    updateBetCountdown();
    betTimer = setInterval(updateBetCountdown, 100);
  }

  function updateBetCountdown(){
    const left = Math.max(0, betEndsAt - Date.now());
    const secs = (left/1000);
    elBig.textContent = secs.toFixed(1)+'s';
    elSub.textContent = betPlaced ? 'bet placed — get ready' : 'place your bet';
    if(left<=0){
      clearInterval(betTimer); betTimer=null;
      beginPlay();
    }
  }

  // Player commits a bet during the window (button / Space / Enter). Does NOT start play.
  function placeBet(){
    if(phase!=='bet' || betPlaced) return;
    const amt = Math.max(1, Math.floor(Number(betAmt.value)||0));
    if(amt > balance){ flashHint("Not enough balance."); return; }
    bet = amt;
    setBalance(balance - bet);
    betPlaced = true;
    placeBtn.disabled=true;
    betAmt.disabled=true;
    placeBtn.textContent='Bet Placed';
    updateBetCountdown();
  }

  // Betting window closed — run the predetermined round for everyone.
  function beginPlay(){
    phase='playing';
    betPanel.classList.add('hidden');
    placeBtn.textContent='Place Bet';
    // No bet this round: just spectate the round play out, then loop.
    if(!betPlaced){
      elBig.textContent='NO BET';
      elBig.style.color='var(--muted)';
      elSub.textContent='watching this round';
    } else {
      playPanel.classList.remove('hidden');
      elAreaNow.classList.remove('hidden');
      lockR.disabled=false; lockB.disabled=false;
      lockR.classList.remove('done'); lockB.classList.remove('done');
      lockR.querySelector('span').textContent='Lock Green';
      lockB.querySelector('span').textContent='Lock Blue';
      lockBoth.disabled=false; lockBoth.textContent='Lock Both';
      elBig.textContent=''; elSub.textContent='';
    }
    loop = setInterval(tick, TICK);
  }

  function tick(){
    advanceAxis(red,  'red',  RED_RATE);
    advanceAxis(blue, 'blue', BLUE_RATE);
    render();

    if(!betPlaced){
      // spectator round: let both axes run to their crash, then loop
      if(red.settled && blue.settled) endSpectatorRound();
      return;
    }

    // bust: an axis crashed while it was never locked
    if(red.crashed && !red.locked)  return bust('red');
    if(blue.crashed && !blue.locked) return bust('blue');

    // both axes have fully resolved (locked-and-revealed) -> settle the win
    if(red.settled && blue.settled) settle(true);
  }

  function endSpectatorRound(){
    if(phase==='settled') return;
    clearInterval(loop); loop=null; phase='settled';
    render();
    elBig.textContent='ROUND OVER';
    elBig.style.color='var(--muted)';
    elSub.textContent='green '+red.crashAt.toFixed(2)+'×  ·  blue '+blue.crashAt.toFixed(2)+'×';
    setTimeout(openBettingWindow, RESULT_HOLD);
  }

  function advanceAxis(s, which, rate){
    if(s.settled) return;
    // ghost always climbs the real curve until the predetermined crash point
    s.ghost += rate * (TICK/60);
    if(!s.locked) s.mult = s.ghost;   // live value tracks ghost until you lock
    if(s.ghost >= s.crashAt){
      s.ghost = s.crashAt;
      s.crashed = true;               // the curve reached its crash point
      s.settled = true;               // ghost line is now revealed at crashAt
      if(!s.locked){
        s.mult = s.crashAt;
        (which==='red'?elReadR:elReadB).className =
          'read '+(which==='red'?'r':'b')+' crashed';
      }
    }
  }

  function lock(which){
    const s = which==='red'?red:blue;
    if(s.locked||s.crashed||phase!=='playing') return;
    s.locked=true;
    const btn = which==='red'?lockR:lockB;
    btn.disabled=true; btn.classList.add('done');
    btn.querySelector('span').textContent = (which==='red'?'Green':'Blue')+' Locked';
    (which==='red'?elReadR:elReadB).classList.add('locked');
    refreshLockBoth();
  }

  function lockBothAxes(){
    if(phase!=='playing') return;
    lock('red');
    lock('blue');
  }

  // disable Lock Both when neither axis is still lockable
  function refreshLockBoth(){
    const canLockR = !red.locked  && !red.crashed;
    const canLockB = !blue.locked && !blue.crashed;
    lockBoth.disabled = !(canLockR || canLockB);
  }

  function bust(crasher){
    if(phase==='settled') return;
    clearInterval(loop); loop=null; phase='settled';
    lockR.disabled=true; lockB.disabled=true; lockBoth.disabled=true;
    render();
    elBig.textContent = 'BUST';
    elBig.style.color='#ff3b5c';
    const cm = (crasher==='red'?red:blue).crashAt;
    const crasherName = crasher==='red'?'GREEN':'BLUE';
    elSub.textContent = crasherName+' crashed at '+cm.toFixed(2)+'×';
    elAreaNow.classList.add('hidden');
    setTimeout(openBettingWindow, RESULT_HOLD);
  }

  function settle(won){
    if(phase==='settled') return;
    clearInterval(loop); loop=null; phase='settled';
    lockR.disabled=true; lockB.disabled=true; lockBoth.disabled=true;
    render();

    const payout = bet * red.mult * blue.mult;
    setBalance(balance + payout);
    elBig.textContent = 'You win '+usd(payout);
    elBig.style.color='var(--win)';
    elSub.textContent = 'AREA = '+red.mult.toFixed(2)+' × '+blue.mult.toFixed(2);
    elAreaNow.classList.add('hidden');
    setTimeout(openBettingWindow, RESULT_HOLD);
  }

  function flashHint(msg){
    const h=document.getElementById('hint'); const old=h.textContent;
    h.textContent=msg; h.style.color='var(--red)';
    setTimeout(()=>{h.textContent=old;h.style.color='';},1600);
  }

  // ---------- rendering ----------
  function clearCanvas(){ ctx.clearRect(0,0,W,H); drawGrid(VIEW_MAX); }

  // draw a plane sprite centered at (x,y), rotated so its nose leads its travel.
  // source art points up (nose at top); angleDeg rotates clockwise from that.
  function drawPlane(img, x, y, angleDeg, faded){
    if(!img.complete || !img.naturalWidth) return;
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angleDeg * Math.PI/180);
    if(faded) ctx.globalAlpha = 0.4;
    ctx.drawImage(img, -PLANE/2, -PLANE/2, PLANE, PLANE);
    ctx.restore();
  }

  function drawGhostLabel(x, y, text, color, orient){
    ctx.save();
    ctx.font='600 24px DM Mono, monospace';
    ctx.fillStyle=color;
    if(orient==='v'){ // vertical line, label near top, centered on x
      ctx.textAlign='center'; ctx.textBaseline='bottom';
      ctx.fillText(text, x, y);
    }else{ // horizontal line, label at right edge, above the line
      ctx.textAlign='right'; ctx.textBaseline='bottom';
      ctx.fillText(text, x, y-6);
    }
    ctx.restore();
  }

  function drawGrid(vmax){
    ctx.clearRect(0,0,W,H);
    ctx.strokeStyle='#1e1e30'; ctx.lineWidth=1; ctx.font='28px DM Mono, monospace';
    for(let i=1;i<=vmax;i++){
      const t=i/vmax;
      // vertical (red axis ticks)
      ctx.beginPath();ctx.moveTo(t*W,0);ctx.lineTo(t*W,H);ctx.stroke();
      // horizontal (blue axis ticks)
      ctx.beginPath();ctx.moveTo(0,H-t*H);ctx.lineTo(W,H-t*H);ctx.stroke();
    }
  }

  function render(){
    const r=red.mult, b=blue.mult;          // locked-in (payout) values
    const gr=red.ghost, gb=blue.ghost;       // live curve position (keeps climbing post-lock)
    // crash line only revealed once that axis has actually reached its crash point
    const crashLineR = red.settled  ? red.crashAt  : null;
    const crashLineB = blue.settled ? blue.crashAt : null;
    // view must fit the locked rect AND the still-growing ghost edges
    const vmax = Math.max(VIEW_MAX, Math.ceil(Math.max(gr, gb)));
    drawGrid(vmax);

    const px=(r/vmax)*W,  py=(b/vmax)*H;     // locked rectangle corner
    const gx=(gr/vmax)*W, gy=(gb/vmax)*H;    // ghost (live curve) corner

    // ghost rectangle: the area you'd have had if you never locked (faint, behind)
    if(red.locked || blue.locked){
      ctx.fillStyle='rgba(255,255,255,0.05)';
      ctx.fillRect(0, H-gy, gx, gy);
      ctx.setLineDash([10,10]); ctx.lineWidth=2;
      ctx.strokeStyle='rgba(255,255,255,0.22)';
      ctx.strokeRect(0, H-gy, gx, gy);
      ctx.setLineDash([]);
    }

    // filled locked-in area rectangle (origin bottom-left)
    const grad = ctx.createLinearGradient(0,H,px,H-py);
    grad.addColorStop(0,'rgba(77,214,46,0.28)');
    grad.addColorStop(1,'rgba(46,155,255,0.28)');
    ctx.fillStyle=grad;
    ctx.fillRect(0,H-py,px,py);

    // crash markers: drawn only when the axis has truly crashed (synced reveal)
    ctx.setLineDash([14,12]); ctx.lineWidth=3;
    if(crashLineR!==null){
      const cx=(crashLineR/vmax)*W;
      ctx.strokeStyle='rgba(77,214,46,0.7)';
      ctx.beginPath();ctx.moveTo(cx,0);ctx.lineTo(cx,H);ctx.stroke();
      drawGhostLabel(cx, 40, crashLineR.toFixed(2)+'×', '#4dd62e', 'v');
    }
    if(crashLineB!==null){
      const cy=H-(crashLineB/vmax)*H;
      ctx.strokeStyle='rgba(46,155,255,0.7)';
      ctx.beginPath();ctx.moveTo(0,cy);ctx.lineTo(W,cy);ctx.stroke();
      drawGhostLabel(W-12, cy, crashLineB.toFixed(2)+'×', '#2e9bff', 'h');
    }
    ctx.setLineDash([]);

    // edges: bottom = green axis, left = blue axis
    ctx.lineWidth=6;
    ctx.strokeStyle = (red.crashed&&!red.locked)?'#555':(red.locked?'#9bef84':'#4dd62e');
    ctx.beginPath();ctx.moveTo(0,H);ctx.lineTo(px,H);ctx.stroke();      // bottom (green)
    ctx.strokeStyle = (blue.crashed&&!blue.locked)?'#555':(blue.locked?'#9ccbff':'#2e9bff');
    ctx.beginPath();ctx.moveTo(0,H);ctx.lineTo(0,H-py);ctx.stroke();    // left (blue)

    // far edges of rect (lighter)
    ctx.lineWidth=2; ctx.strokeStyle='rgba(255,255,255,0.18)';
    ctx.beginPath();ctx.moveTo(px,H);ctx.lineTo(px,H-py);ctx.lineTo(0,H-py);ctx.stroke();

    // planes ride the live tip of each axis line.
    // red runs along the bottom (nose right, +90deg); blue climbs the left edge (nose up, 0deg).
    drawPlane(redPlane,  Math.min(gx, W-PLANE/2), H-PLANE/2+4, 90, red.crashed && !red.locked);
    drawPlane(bluePlane, PLANE/2-4, Math.max(H-gy, PLANE/2), 0, blue.crashed && !blue.locked);

    // readouts: unlocked shows live value; locked shows live ghost climbing toward its crash,
    // with the frozen locked value noted so the player remembers what they banked.
    elValR.textContent = red.locked  ? gr.toFixed(2) : r.toFixed(2);
    elValB.textContent = blue.locked ? gb.toFixed(2) : b.toFixed(2);
    lockRv.textContent = (red.locked  ? 'LOCKED '+r.toFixed(2) : gr.toFixed(2))+'×';
    lockBv.textContent = (blue.locked ? 'LOCKED '+b.toFixed(2) : gb.toFixed(2))+'×';
    if(phase==='playing'){
      elAreaNow.textContent = (r*b).toFixed(2)+'×';
    }
  }

  // ---------- wiring ----------
  placeBtn.addEventListener('click',placeBet);
  lockR.addEventListener('click',()=>lock('red'));
  lockB.addEventListener('click',()=>lock('blue'));
  lockBoth.addEventListener('click',lockBothAxes);
  document.querySelectorAll('.chip').forEach(c=>{
    c.addEventListener('click',()=>{
      if(phase!=='bet'||betPlaced) return;
      const v=c.dataset.c;
      let cur=Number(betAmt.value)||0;
      betAmt.value = v==='x2'? Math.max(1,cur*2) : cur+Number(v);
    });
  });
  document.addEventListener('keydown',e=>{
    if(phase==='playing' && betPlaced){
      if(e.key==='ArrowLeft'||e.key.toLowerCase()==='r') lock('red');
      if(e.key==='ArrowRight'||e.key.toLowerCase()==='b') lock('blue');
      if(e.key==='ArrowDown'||e.key.toLowerCase()==='l'||e.key===' ') { e.preventDefault(); lockBothAxes(); }
    } else if(phase==='bet' && (e.key===' '||e.key==='Enter')){
      e.preventDefault(); placeBet();
    }
  });

  // kick off the scheduled round loop
  openBettingWindow();
})();
</script>
</body>
</html>
